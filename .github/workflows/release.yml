name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the build (e.g. 1.0.0). No release is published for manual runs.'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      raw: ${{ steps.version.outputs.raw }}
      num: ${{ steps.version.outputs.num }}
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RAW="${GITHUB_REF#refs/tags/}"
          else
            RAW="${{ github.event.inputs.version }}"
          fi
          # Strip any leading "v" so installers get a numeric version.
          NUM="${RAW#v}"
          echo "raw=${RAW}" >> "$GITHUB_OUTPUT"
          echo "num=${NUM}" >> "$GITHUB_OUTPUT"
          echo "Building version raw=${RAW} num=${NUM}"

  windows:
    needs: version
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build single-file Windows executable
        run: npx --no-install pkg . --targets node20-win-x64 --output dist/aram-dash.exe

      - name: Build installer with Inno Setup
        shell: cmd
        run: '"%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ needs.version.outputs.num }} installer\aram-dash.iss'

      - name: List build artifacts
        shell: bash
        run: ls -la dist/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aram-dash-installer-windows-${{ needs.version.outputs.raw }}
          path: |
            dist/aram-dash-setup-*.exe
            dist/aram-dash.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ARAM Mayhem Dashboard ${{ needs.version.outputs.raw }}
          tag_name: ${{ needs.version.outputs.raw }}
          generate_release_notes: true
          files: |
            dist/aram-dash-setup-*.exe

  macos:
    needs: version
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build single-file macOS executables
        run: |
          npx --no-install pkg . --targets node20-macos-arm64 --output dist/macos-arm64/aram-dash
          npx --no-install pkg . --targets node20-macos-x64 --output dist/macos-x64/aram-dash

      - name: Build .pkg installers
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.num }}"
          mkdir -p dist
          for ARCH in arm64 x64; do
            ROOT="pkgroot-${ARCH}"
            rm -rf "${ROOT}"
            mkdir -p "${ROOT}/usr/local/bin"
            cp "dist/macos-${ARCH}/aram-dash" "${ROOT}/usr/local/bin/aram-dash"
            chmod +x "${ROOT}/usr/local/bin/aram-dash"
            pkgbuild \
              --root "${ROOT}" \
              --identifier com.cheesejaguar.aram-dash \
              --version "${VERSION}" \
              --install-location / \
              "dist/aram-dash-${VERSION}-macos-${ARCH}.pkg"
          done

      - name: List build artifacts
        run: ls -la dist/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aram-dash-installer-macos-${{ needs.version.outputs.raw }}
          path: dist/aram-dash-*-macos-*.pkg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ARAM Mayhem Dashboard ${{ needs.version.outputs.raw }}
          tag_name: ${{ needs.version.outputs.raw }}
          generate_release_notes: true
          files: |
            dist/aram-dash-*-macos-*.pkg

  linux-deb:
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build single-file Linux executable
        run: npx --no-install pkg . --targets node20-linux-x64 --output dist/aram-dash

      - name: Build .deb package
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.num }}"
          PKG="aram-dash_${VERSION}_amd64"
          rm -rf "${PKG}"
          mkdir -p \
            "${PKG}/DEBIAN" \
            "${PKG}/usr/bin" \
            "${PKG}/usr/share/applications" \
            "${PKG}/usr/share/doc/aram-dash"

          install -m 0755 dist/aram-dash "${PKG}/usr/bin/aram-dash"

          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: aram-dash
          Version: ${VERSION}
          Section: games
          Priority: optional
          Architecture: amd64
          Maintainer: cheesejaguar <noreply@github.com>
          Homepage: https://github.com/cheesejaguar/aram-dash
          Description: ARAM Mayhem Dashboard
           Realtime 16:9 dashboard for League of Legends ARAM Mayhem,
           designed as an OBS browser source. Proxies the Riot Live
           Client Data API at https://127.0.0.1:2999.
          EOF

          # dpkg-deb is strict about whitespace in control; strip the
          # leading indentation introduced by the heredoc.
          sed -i 's/^          //' "${PKG}/DEBIAN/control"

          cat > "${PKG}/usr/share/applications/aram-dash.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=ARAM Mayhem Dashboard
          Comment=Realtime ARAM Mayhem dashboard for OBS
          Exec=/usr/bin/aram-dash
          Terminal=true
          Categories=Game;
          EOF
          sed -i 's/^          //' "${PKG}/usr/share/applications/aram-dash.desktop"

          if [ -f README.md ]; then
            cp README.md "${PKG}/usr/share/doc/aram-dash/README"
          fi

          dpkg-deb --build --root-owner-group "${PKG}"
          mkdir -p dist
          mv "${PKG}.deb" "dist/${PKG}.deb"

      - name: List build artifacts
        run: ls -la dist/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: aram-dash-installer-linux-${{ needs.version.outputs.raw }}
          path: dist/aram-dash_*_amd64.deb
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ARAM Mayhem Dashboard ${{ needs.version.outputs.raw }}
          tag_name: ${{ needs.version.outputs.raw }}
          generate_release_notes: true
          files: |
            dist/aram-dash_*_amd64.deb
